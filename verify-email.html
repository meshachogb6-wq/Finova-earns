<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Verify Email - Finova Earns

</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="auth-container">

<div class="auth-box">

<h1>

Verify Your Email

</h1>

<p>

Enter the 6-digit verification code sent to your email.

</p>

<form action="dashboard.html">

<input
type="text"
maxlength="6"
placeholder="Enter 6-digit Code"
required>

<button class="primary-btn">

Verify Email

</button>

</form>

<p>

Didn't receive the code?

<a href="#">

Resend Code

</a>

</p>
<p>

The verification code expires in <strong>10 minutes</strong>.

</p>

<p>

After successful verification, your account will be activated automatically.

</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
